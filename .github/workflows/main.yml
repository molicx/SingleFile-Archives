name: 触发 Hugo 博客更新

on:
  push:
    branches: [ main ]  # 当归档仓库的主分支有更新时触发

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: 发送仓库分发事件 (Repository Dispatch)
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/molicx/my-blog-source/dispatches \
            -d '{"event_type":"update-archives"}'
